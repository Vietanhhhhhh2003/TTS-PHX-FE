services:
  web:
    build: .
    ports:
      - "3000:3000"
    env_file: .env.local
    environment:
      - NODE_ENV=production

  postgres:
    image: postgres:16
    container_name: employee_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: employees
    ports:
      - "5434:5432"          # host 5434 vi Postgres local da chiem 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d employees"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgraphile:
    build:
      context: .
      dockerfile: Dockerfile.postgraphile
    image: employee-postgraphile:4-filter
    container_name: employee_postgraphile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5433:5000"
    command:
      - "--connection"
      - "postgres://postgres:postgres@postgres:5432/employees"
      - "--schema"
      - "public"
      - "--watch"
      - "--enhance-graphiql"
      - "--cors"
      - "--append-plugins"
      - "postgraphile-plugin-connection-filter"

  # Tuan 4 - Queue: RabbitMQ (gioi thieu producer -> consumer).
  rabbitmq:
    image: rabbitmq:3-management
    container_name: employee_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # cong AMQP (app noi vao)
      - "15672:15672" # web console: http://localhost:15672 (guest/guest)
    healthcheck:
      # image len cham ~vai chuc giay -> healthcheck de consumer doi RabbitMQ ready
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
